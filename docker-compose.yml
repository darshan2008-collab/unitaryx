version: "3.8"

services:
  db:
    profiles: ["internal-db"]
    image: postgres:16-alpine
    container_name: unitaryx-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-unitaryx}
      POSTGRES_USER: ${POSTGRES_USER:-unitaryx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeThisDbPassword!}
      TZ: ${TZ:-UTC}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - ${DATA_ROOT:-/mnt/Hdd/Hari/Projects/UnitaryX}/unitaryx-db:/var/lib/postgresql/data
    networks:
      - unitaryx_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: unitaryx-app:latest
    container_name: unitaryx-app
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-change_this_to_a_long_random_secret}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@unitaryx.com}
      ADMIN_PASS: ${ADMIN_PASS:-ChangeMeNow123!}
      PORT: ${APP_PORT:-10003}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-unitaryx}:${POSTGRES_PASSWORD:-ChangeThisDbPassword!}@${DB_HOST:-host.docker.internal}:${DB_PORT:-5432}/${POSTGRES_DB:-unitaryx}}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_ALLOWED_ORIGINS: ${GOOGLE_ALLOWED_ORIGINS:-https://unitaryx.org,http://localhost:10003,http://127.0.0.1:10003}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-True}
      GUNICORN_CMD_ARGS: --bind 0.0.0.0:${APP_PORT:-10003} --workers ${GUNICORN_WORKERS:-2} --threads ${GUNICORN_THREADS:-4} --timeout ${GUNICORN_TIMEOUT:-120} --preload
    ports:
      - "${APP_PORT:-10003}:${APP_PORT:-10003}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,sys,urllib.request; p=os.getenv('APP_PORT', os.getenv('PORT','10003')); urllib.request.urlopen(f'http://127.0.0.1:{p}/login', timeout=5); sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    volumes:
      - ${DATA_ROOT:-/mnt/Hdd/Hari/Projects/UnitaryX}/unitaryx-app:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.http.routers.unitaryx.rule=Host(`${TRAEFIK_HOST:-unitaryx.example.com}`)"
      - "traefik.http.routers.unitaryx.entrypoints=websecure"
      - "traefik.http.routers.unitaryx.tls=true"
      - "traefik.http.services.unitaryx.loadbalancer.server.port=${APP_PORT:-10003}"
    networks:
      - unitaryx_net

networks:
  unitaryx_net:
    name: unitaryx_net
    driver: bridge
